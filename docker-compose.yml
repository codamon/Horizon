services:
  horizon:
    build: .
    container_name: horizon
    # Share the existing Ollama container network namespace so
    # http://127.0.0.1:11434 inside Horizon reaches Ollama directly.
    network_mode: "container:ollama"
    volumes:
      - ./data:/app/data
      - ./docs:/app/docs
      - ./.env:/app/.env:ro
    env_file:
      - .env
    environment:
      TZ: ${TZ:-Pacific/Auckland}
      HORIZON_OLLAMA_BASE_URL: http://127.0.0.1:11434
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu;
        while true; do
          now="$$(date +%s)";
          target="$$(date -d "$${HORIZON_SCHEDULE_TIME:-08:00} today" +%s)";
          if [ "$$now" -ge "$$target" ]; then
            target="$$(date -d "$${HORIZON_SCHEDULE_TIME:-08:00} tomorrow" +%s)";
          fi;
          wait_seconds=$$((target - now));
          echo "[$$(date +'%Y-%m-%dT%H:%M:%S%z')] Next Horizon run at $$(date -d "@$$target" '+%Y-%m-%d %H:%M:%S %Z') (in $${wait_seconds}s)";
          sleep "$$wait_seconds";
          echo "[$$(date +'%Y-%m-%dT%H:%M:%S%z')] Starting scheduled Horizon run";
          uv run horizon --hours "$${HORIZON_HOURS:-24}" || echo "Horizon run failed with exit code $$?";
        done
