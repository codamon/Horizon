services:
  horizon:
    build: .
    container_name: horizon
    # Share the existing Ollama container network namespace so
    # http://127.0.0.1:11434 inside Horizon reaches Ollama directly.
    network_mode: "container:ollama"
    volumes:
      - ./data:/app/data
      - ./docs:/app/docs
      - ./.env:/app/.env:ro
    env_file:
      - .env
    environment:
      TZ: ${TZ:-Pacific/Auckland}
      HORIZON_OLLAMA_BASE_URL: http://127.0.0.1:11434
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu;
        echo "[$$(date +'%Y-%m-%dT%H:%M:%S%z')] Horizon Docker runtime is ready; scheduled runs are managed by the host timer.";
        while true; do sleep 3600; done
